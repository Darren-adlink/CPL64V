<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Scan Master - 線掃描同步計算實驗室</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (for icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0; /* Slate 200 */
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .spin-wheel {
            transform-origin: center;
            animation: spin linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-gradient {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        }

        .pulse-led {
            animation: pulse-flash 0.1s ease-out infinite;
        }

        @keyframes pulse-flash {
            0% { opacity: 0.2; transform: scale(1); box-shadow: 0 0 0px #ef4444; }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px #ef4444; }
            100% { opacity: 0.2; transform: scale(1); box-shadow: 0 0 0px #ef4444; }
        }
        
        .blink-once {
            animation: blink-once-anim 0.2s ease-out forwards;
        }
        
        @keyframes blink-once-anim {
            0% { opacity: 0.2; background-color: #ef4444; box-shadow: 0 0 0px #ef4444; }
            50% { opacity: 1; background-color: #22c55e; box-shadow: 0 0 15px #22c55e; } 
            100% { opacity: 0.2; background-color: #ef4444; box-shadow: 0 0 0px #ef4444; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            // --- State: User Inputs ---
            // Group 1: Speed & Encoder
            const [speedValue, setSpeedValue] = useState(1); // Default 1
            const [speedUnit, setSpeedUnit] = useState('rev_s'); // 'rev_s' or 'rpm'
            const [encoderPPR, setEncoderPPR] = useState(360000);
            const [divider, setDivider] = useState(30);
            
            // Group 2: Physical Setup
            const [rollerDiameter, setRollerDiameter] = useState(100); // mm
            const [objectLength, setObjectLength] = useState(150); // mm (RMB 1 Yuan)
            const [frameBufferLines, setFrameBufferLines] = useState(6000); // lines

            // Group 3: Camera Specs
            const [resolution, setResolution] = useState(8192);
            const [bitDepth, setBitDepth] = useState(8); // 8, 10, 12

            // --- Calculations ---
            
            // 1. Lines Per Revolution (一圈多少條線)
            const linesPerRev = useMemo(() => encoderPPR / divider, [encoderPPR, divider]);

            // 2. Speed in Rev/Sec
            const speedRevPerSec = useMemo(() => {
                return speedUnit === 'rpm' ? speedValue / 60 : speedValue;
            }, [speedValue, speedUnit]);

            // 3. Line Rate (Hz)
            const lineRateHz = useMemo(() => speedRevPerSec * linesPerRev, [speedRevPerSec, linesPerRev]);

            // 4. Line Period (us) / Max Exposure
            const linePeriodUs = useMemo(() => lineRateHz > 0 ? (1000000 / lineRateHz) : 0, [lineRateHz]);
            const maxExposureUs = linePeriodUs; 

            // 5. Data Rate (Throughput)
            const bytesPerSec = useMemo(() => (resolution * lineRateHz * bitDepth) / 8, [resolution, lineRateHz, bitDepth]);
            const throughputMBps = useMemo(() => bytesPerSec / 1000000, [bytesPerSec]);

            // 6. Physical Calculations
            const circumference = useMemo(() => Math.PI * rollerDiameter, [rollerDiameter]); // mm
            const resolutionY_mm = useMemo(() => circumference / linesPerRev, [circumference, linesPerRev]); // mm per line
            const resolutionY_um = useMemo(() => resolutionY_mm * 1000, [resolutionY_mm]); // um per line
            
            // How many lines needed for the object?
            const linesRequiredForObject = useMemo(() => objectLength / resolutionY_mm, [objectLength, resolutionY_mm]);
            
            // How much physical length does the Frame Buffer cover?
            const physicalLengthOfFrame = useMemo(() => frameBufferLines * resolutionY_mm, [frameBufferLines, resolutionY_mm]);

            // 7. Camera Link Mode Suggestion
            const clMode = useMemo(() => {
                if (throughputMBps <= 255) return { name: 'Base', color: 'text-green-400', desc: '單一接頭, 頻寬充裕' };
                if (throughputMBps <= 510) return { name: 'Medium', color: 'text-yellow-400', desc: '需雙接頭' };
                if (throughputMBps <= 680) return { name: 'Full', color: 'text-orange-400', desc: '需雙接頭, 8 Tap' };
                if (throughputMBps <= 850) return { name: 'Deca (80-bit)', color: 'text-red-400', desc: '極限模式, 線材要求高' };
                return { name: 'Over Limit', color: 'text-red-600', desc: '超過 Camera Link 極限，需 CoaXPress' };
            }, [throughputMBps]);

            // --- Animation Style ---
            const animationDuration = speedRevPerSec > 0 ? (1 / speedRevPerSec) + 's' : '0s';
            // Scale object relative to roller for visualization (approx)
            const objectArcLength = (objectLength / circumference) * 360; 

            // Home Sensor Animation Logic
            const homeSensorRef = useRef(null);
            
            useEffect(() => {
                // Simple interval to simulate DI0 blinking based on speed
                if (speedRevPerSec <= 0) return;
                const intervalMs = (1 / speedRevPerSec) * 1000;
                
                const timer = setInterval(() => {
                    if(homeSensorRef.current) {
                        // Reset animation
                        homeSensorRef.current.classList.remove('blink-once');
                        void homeSensorRef.current.offsetWidth; // trigger reflow
                        homeSensorRef.current.classList.add('blink-once');
                    }
                }, intervalMs);

                return () => clearInterval(timer);
            }, [speedRevPerSec]);


            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1400px] mx-auto">
                    
                    {/* Header */}
                    <header className="mb-8 border-b border-slate-700 pb-4">
                        <div className="flex items-center gap-3">
                            <i className="ph ph-scan text-4xl text-blue-500"></i>
                            <div>
                                <h1 className="text-3xl font-bold text-white tracking-tight">Line Scan Master</h1>
                                <p className="text-slate-400 text-sm">線掃描同步計算實驗室 | Frame Height & Resolution Calculator</p>
                            </div>
                        </div>
                    </header>

                    {/* Main Grid Layout */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-12">
                        
                        {/* LEFT COLUMN: Input Panels (4 cols) */}
                        <div className="lg:col-span-4 space-y-6">
                            
                            {/* Panel 1: Motion & Encoder */}
                            <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg">
                                <h2 className="text-md font-bold mb-4 flex items-center gap-2 text-blue-300 border-b border-slate-700 pb-2">
                                    <i className="ph ph-engine"></i> 馬達與編碼器
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-slate-400 text-xs mb-1">滾輪轉速 (Speed)</label>
                                        <div className="flex gap-2">
                                            <input type="number" value={speedValue} onChange={(e) => setSpeedValue(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-blue-500 focus:outline-none" />
                                            <select value={speedUnit} onChange={(e) => setSpeedUnit(e.target.value)} className="bg-slate-700 border border-slate-600 rounded px-1 text-white text-xs focus:outline-none">
                                                <option value="rev_s">rev/s</option>
                                                <option value="rpm">RPM</option>
                                            </select>
                                        </div>
                                    </div>
                                    {/* Updated Layout Ratio to 4:6 (2:3) */}
                                    <div className="grid grid-cols-5 gap-3">
                                        <div className="col-span-2">
                                            <label className="block text-slate-400 text-xs mb-1">PPR (脈衝/圈)</label>
                                            <input type="number" value={encoderPPR} onChange={(e) => setEncoderPPR(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-blue-500 focus:outline-none" />
                                        </div>
                                        <div className="col-span-3">
                                            <label className="block text-slate-400 text-xs mb-1">Divider Ratio (Pulses Per Line)</label>
                                            <input type="number" value={divider} onChange={(e) => setDivider(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-blue-500 focus:outline-none" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Panel 2: Physical & Frame (New!) */}
                            <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-emerald-500/10 to-transparent pointer-events-none"></div>
                                <h2 className="text-md font-bold mb-4 flex items-center gap-2 text-emerald-300 border-b border-slate-700 pb-2">
                                    <i className="ph ph-ruler"></i> 物理尺寸與 Frame
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-slate-400 text-xs mb-1">滾輪直徑 (Roller Diameter, mm)</label>
                                        <input type="number" value={rollerDiameter} onChange={(e) => setRollerDiameter(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-emerald-500 focus:outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-slate-400 text-xs mb-1">物件長度 (mm)</label>
                                            <input type="number" value={objectLength} onChange={(e) => setObjectLength(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-emerald-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-slate-400 text-xs mb-1">Frame Lines</label>
                                            <input type="number" value={frameBufferLines} onChange={(e) => setFrameBufferLines(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-emerald-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    
                                    {/* Suggestion Section */}
                                    <div className="bg-slate-900/50 p-2 rounded border border-slate-600/50 mt-2">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] text-slate-400">針對 {objectLength}mm 物件建議:</span>
                                            <span className="text-xs text-emerald-400 font-mono font-bold">
                                                 Min {Math.ceil(linesRequiredForObject).toLocaleString()} lines
                                            </span>
                                        </div>
                                    </div>

                                    <div className="text-[10px] text-slate-500 text-right">
                                        *圓周長: {circumference.toFixed(2)} mm
                                    </div>
                                </div>
                            </div>

                            {/* Panel 3: Camera */}
                            <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg">
                                <h2 className="text-md font-bold mb-4 flex items-center gap-2 text-purple-300 border-b border-slate-700 pb-2">
                                    <i className="ph ph-camera"></i> 相機規格
                                </h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-slate-400 text-xs mb-1">寬度 (Pixels)</label>
                                        <input type="number" value={resolution} onChange={(e) => setResolution(parseFloat(e.target.value)||0)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-purple-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-slate-400 text-xs mb-1">Bit Depth</label>
                                        <select value={bitDepth} onChange={(e) => setBitDepth(parseFloat(e.target.value))} className="bg-slate-900 border border-slate-600 rounded px-2 py-1.5 w-full text-white font-mono text-sm focus:border-purple-500 focus:outline-none">
                                            <option value={8}>8-bit</option>
                                            <option value={10}>10-bit</option>
                                            <option value={12}>12-bit</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* MIDDLE COLUMN: Visualization (4 cols) */}
                        <div className="lg:col-span-4 flex flex-col gap-4">
                            
                            {/* Motor Simulation */}
                            <div className="bg-slate-900 rounded-xl border border-slate-800 relative overflow-hidden h-[320px] flex items-center justify-center">
                                <div className="absolute top-3 left-3 text-slate-500 text-xs font-mono z-10">
                                    <div>SIMULATION</div>
                                    <div>Speed: {speedRevPerSec.toFixed(2)} rev/s</div>
                                </div>
                                
                                <div className="relative">
                                    {/* Sensors Layout */}
                                    
                                    {/* 1. DI0 Frame Trigger Sensor (Stationary, Top Center) */}
                                    <div className="absolute -top-16 left-1/2 -translate-x-1/2 flex flex-col items-center">
                                        <div className="text-[10px] text-slate-400 font-mono mb-1">DI0 (Home)</div>
                                        <div ref={homeSensorRef} className="w-4 h-6 bg-slate-700 border border-slate-500 rounded-b flex items-center justify-center">
                                            <div className="w-2 h-2 rounded-full bg-red-900"></div>
                                        </div>
                                    </div>

                                    {/* 2. CC1 Line Trigger Sensor (Stationary, Right Side) */}
                                    <div className="absolute -right-16 top-1/2 -translate-y-1/2 flex flex-col items-center">
                                        <div className="flex items-center gap-1 mb-1">
                                            <div className="w-2 h-2 rounded-full bg-red-500"
                                                style={{ animation: speedRevPerSec > 0 ? `pulse-flash ${1/Math.min(10, lineRateHz)}s infinite` : 'none', opacity: speedRevPerSec > 0 ? 1 : 0.2 }}></div>
                                            <span className="text-[10px] text-red-400 font-mono">CC1</span>
                                        </div>
                                        <div className="w-6 h-4 bg-slate-700 border border-slate-500 rounded-l"></div>
                                    </div>

                                    {/* Roller SVG */}
                                    <svg width="240" height="240" viewBox="0 0 240 240" className="spin-wheel" style={{ animationDuration: animationDuration, animationPlayState: speedRevPerSec === 0 ? 'paused' : 'running' }}>
                                        <g transform="translate(120, 120)">
                                            {/* Wheel Body */}
                                            <circle cx="0" cy="0" r="90" fill="#334155" stroke="#475569" strokeWidth="2" />
                                            <circle cx="0" cy="0" r="20" fill="#1e293b" />
                                            
                                            {/* Spokes */}
                                            <line x1="0" y1="-90" x2="0" y2="90" stroke="#64748b" strokeWidth="1" strokeDasharray="5 5" />
                                            <line x1="-90" y1="0" x2="90" y2="0" stroke="#64748b" strokeWidth="1" strokeDasharray="5 5" />
                                            
                                            {/* DI0 Trigger Notch */}
                                            <rect x="-4" y="-94" width="8" height="12" fill="#eab308" />
                                            
                                            {/* Dynamic Object Size Visualization */}
                                            {objectLength > 0 && (
                                                <path 
                                                    d={`M 0,-90 A 90,90 0 ${objectArcLength > 180 ? 1 : 0},1 ${90 * Math.sin(objectArcLength * Math.PI / 180)}, ${-90 * Math.cos(objectArcLength * Math.PI / 180)}`}
                                                    fill="none"
                                                    stroke="#10b981"
                                                    strokeWidth="12"
                                                    strokeOpacity="0.6"
                                                    transform="rotate(10)" 
                                                />
                                            )}
                                            <text x="0" y="-50" textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">Roller</text>
                                        </g>
                                    </svg>
                                </div>
                                <div className="absolute bottom-3 w-full text-center text-xs text-slate-500">
                                    上方黃色標記為原點 (DI0)，右側紅燈為編碼器觸發 (CC1)
                                </div>
                            </div>

                            {/* Frame Coverage Card */}
                            <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg flex-grow flex flex-col justify-center">
                                <h3 className="text-sm font-bold text-emerald-300 mb-3 flex items-center justify-between">
                                    <span>Frame 覆蓋分析</span>
                                    <span className="text-xs bg-emerald-900/50 px-2 py-1 rounded text-emerald-200">反推計算</span>
                                </h3>
                                
                                {/* Result 1: Y-Resolution */}
                                <div className="flex justify-between items-center mb-3 text-sm">
                                    <span className="text-slate-400">Y 軸解析度 <span className="text-[10px] text-slate-500">(掃描方向)</span>:</span>
                                    <span className="font-mono text-white">{resolutionY_um.toFixed(2)} μm/line</span>
                                </div>

                                {/* Result 2: Lines for Object */}
                                <div className="flex justify-between items-center mb-3 text-sm">
                                    <span className="text-slate-400">物件 ({objectLength}mm) 需:</span>
                                    <span className="font-mono text-yellow-300 font-bold">{Math.ceil(linesRequiredForObject).toLocaleString()} lines</span>
                                </div>

                                <div className="border-t border-slate-700 my-2"></div>

                                {/* Result 3: Buffer Check */}
                                <div className="flex justify-between items-center mb-2 text-sm">
                                    <span className="text-slate-400">Frame ({frameBufferLines} lines) 覆蓋:</span>
                                    <span className="font-mono text-white">{physicalLengthOfFrame.toFixed(2)} mm</span>
                                </div>

                                {/* Status Message */}
                                <div className={`mt-2 p-2 rounded text-xs flex items-center gap-2 ${physicalLengthOfFrame >= objectLength ? 'bg-green-900/30 text-green-300 border border-green-800' : 'bg-red-900/30 text-red-300 border border-red-800'}`}>
                                    {physicalLengthOfFrame >= objectLength 
                                        ? <><i className="ph ph-check-circle text-lg"></i> 設定足夠！可完整拍下物件。</>
                                        : <><i className="ph ph-warning text-lg"></i> Frame 太短！會切到物件 (缺 {Math.abs(physicalLengthOfFrame - objectLength).toFixed(1)}mm)</>
                                    }
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Speed & Data Results (4 cols) */}
                        <div className="lg:col-span-4 flex flex-col gap-4">
                            
                            {/* Card 1: Line Rate (UPDATED Logic) */}
                            <div className="bg-gradient-to-br from-blue-900/50 to-slate-800 border border-blue-800 rounded-xl p-5 shadow-lg">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <div className="text-blue-200 text-sm font-medium mb-1">Line Rate (掃描頻率)</div>
                                        <div className="text-4xl font-bold text-white font-mono">
                                            {(lineRateHz / 1000).toFixed(2)} <span className="text-lg text-blue-300">kHz</span>
                                        </div>
                                    </div>
                                    <i className="ph ph-wave-sine text-3xl text-blue-500"></i>
                                </div>
                                <div className="mt-3 text-xs text-blue-200/60 bg-blue-900/30 p-2 rounded">
                                    {/* Step 1: Lines per Rev */}
                                    <div className="flex justify-between mb-1 text-blue-300">
                                        <span>一圈線數 (PPR ÷ Divider):</span>
                                        <span className="font-mono">{encoderPPR} ÷ {divider} = {Math.round(linesPerRev).toLocaleString()}</span>
                                    </div>
                                    
                                    {/* Step 2: Hz Calculation */}
                                    <div className="pt-1 border-t border-blue-500/30 text-blue-100 flex justify-between items-center">
                                        <span>頻率 (轉速 × 線數):</span>
                                        <span className="font-mono">
                                            {speedRevPerSec.toFixed(2)} × {Math.round(linesPerRev).toLocaleString()} = <span className="font-bold text-white">{Math.round(lineRateHz).toLocaleString()} Hz</span>
                                        </span>
                                    </div>
                                </div>
                            </div>

                            {/* Card 2: Max Exposure */}
                            <div className="bg-gradient-to-br from-purple-900/50 to-slate-800 border border-purple-800 rounded-xl p-5 shadow-lg">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <div className="text-purple-200 text-sm font-medium mb-1">Max Exposure (最大曝光)</div>
                                        <div className={`text-4xl font-bold font-mono ${maxExposureUs < 5 ? 'text-red-400' : 'text-white'}`}>
                                            {maxExposureUs.toFixed(2)} <span className="text-lg text-purple-300">μs</span>
                                        </div>
                                    </div>
                                    <i className="ph ph-timer text-3xl text-purple-500"></i>
                                </div>
                                
                                <div className="mt-3 text-xs text-purple-200/60 bg-purple-900/30 p-2 rounded">
                                    <div className="mb-1 text-purple-200">週期算式 (物理極限):</div>
                                    <div>1,000,000 ÷ {Math.round(lineRateHz)} Hz = <span className="font-bold text-white">{linePeriodUs.toFixed(2)} μs</span></div>
                                </div>
                            </div>

                            {/* Card 3: Bandwidth */}
                            <div className="bg-gradient-to-br from-emerald-900/50 to-slate-800 border border-emerald-800 rounded-xl p-5 shadow-lg flex-grow">
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <div className="text-emerald-200 text-sm font-medium mb-1">Data Throughput</div>
                                        <div className="text-3xl font-bold text-white font-mono">
                                            {throughputMBps.toFixed(1)} <span className="text-lg text-emerald-300">MB/s</span>
                                        </div>
                                    </div>
                                    <i className="ph ph-cable text-3xl text-emerald-500"></i>
                                </div>
                                <div className="border-t border-emerald-800/50 my-3"></div>
                                <div>
                                    <div className="text-emerald-200 text-xs font-medium mb-1">Camera Link Mode</div>
                                    <div className={`text-xl font-bold ${clMode.color} font-mono`}>{clMode.name}</div>
                                    <div className="text-xs text-slate-400 mt-1">{clMode.desc}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer Guide Sections */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pb-8">
                        <div className="bg-slate-800/50 p-4 rounded border border-slate-700">
                            <h3 className="text-blue-400 font-bold text-xs mb-2">Y 軸解析度定義</h3>
                            <p className="text-slate-400 text-xs">Y 軸即「掃描方向」，也就是滾輪轉動的方向 (圓周方向)。其解析度取決於 Encoder 脈衝密度與除頻設定。</p>
                        </div>
                        <div className="bg-slate-800/50 p-4 rounded border border-slate-700">
                            <h3 className="text-emerald-400 font-bold text-xs mb-2">Frame Height 反推</h3>
                            <p className="text-slate-400 text-xs">所需線數 = 物件長度 / 解析度。若物件 150mm，解析度 0.026mm，則需約 5730 條線才能拍完整。</p>
                        </div>
                        <div className="bg-slate-800/50 p-4 rounded border border-slate-700">
                             <h3 className="text-purple-400 font-bold text-xs mb-2">頻率與曝光</h3>
                             <p className="text-slate-400 text-xs">Line Rate 隨轉速線性增加。轉速越快，曝光時間窗口越小，需要更強的光源。</p>
                        </div>
                        <div className="bg-slate-800/50 p-4 rounded border border-slate-700">
                             <h3 className="text-yellow-400 font-bold text-xs mb-2">變形控制</h3>
                             <p className="text-slate-400 text-xs">理想影像應為正方形像素。請調整鏡頭視野 (FOV) 使得 X 解析度 等於計算出的 Y 解析度。</p>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
